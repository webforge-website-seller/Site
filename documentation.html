<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codiv - Documentation</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-dark: #0a0e27; --primary-light: #1a1f3a;
            --accent-cyan: #00d4ff; --accent-purple: #7c3aed;
            --text-primary: #ffffff; --text-secondary: #a8b5d1;
            --card-border: rgba(0, 212, 255, 0.1);
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1629 100%);
            color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column;
        }
        nav {
            position: fixed; top: 0; width: 100%; z-index: 999;
            backdrop-filter: blur(10px); background: rgba(10, 14, 39, 0.95);
            border-bottom: 1px solid rgba(0, 212, 255, 0.1); padding: 1.2rem 2rem;
        }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        nav ul { display: flex; list-style: none; gap: 2.5rem; align-items: center; }
        nav a { text-decoration: none; color: var(--text-secondary); font-weight: 500; font-size: 0.95rem; transition: color 0.3s; }
        nav a:hover, nav a.active { color: var(--text-primary); }
        .btn-primary { padding: 0.7rem 1.5rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); color: white; text-decoration: none; }
        .btn-admin { padding: 0.7rem 1.5rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; display: none; margin-right: 1rem; }

        /* Docs Layout */
        .docs-container { max-width: 1400px; margin: 100px auto 40px; padding: 2rem; display: grid; grid-template-columns: 250px 1fr; gap: 3rem; flex-grow: 1; }
        .docs-sidebar { position: sticky; top: 120px; height: fit-content; border-right: 1px solid var(--card-border); padding-right: 1rem; }
        .docs-sidebar h3 { color: var(--text-secondary); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem; }
        .docs-nav { display: flex; flex-direction: column; gap: 0.8rem; }
        .docs-nav a { color: var(--text-primary); text-decoration: none; font-size: 0.95rem; opacity: 0.8; transition: all 0.2s; border-left: 2px solid transparent; padding-left: 10px; }
        .docs-nav a:hover, .docs-nav a.active { opacity: 1; color: var(--accent-cyan); border-left-color: var(--accent-cyan); }
        
        .docs-content { padding-bottom: 4rem; }
        .doc-section { margin-bottom: 4rem; scroll-margin-top: 100px; }
        .doc-section h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--accent-cyan); margin-bottom: 1rem; border-bottom: 1px solid var(--card-border); padding-bottom: 0.5rem; }
        .doc-section p, .doc-section li { color: var(--text-secondary); line-height: 1.8; margin-bottom: 1rem; }
        .doc-section pre { background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); overflow-x: auto; color: #a8b5d1; margin-bottom: 1rem; font-family: monospace; }

        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--primary-light); border: 1px solid var(--card-border); border-radius: 12px; padding: 2rem; width: 95%; max-width: 800px; max-height: 90vh; overflow-y: auto; }
        .admin-form input, .admin-form textarea { width: 100%; padding: 0.8rem; margin-top: 0.5rem; margin-bottom: 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); color: white; border-radius: 6px; font-family: 'Poppins', sans-serif;}
        .admin-list-item { display: flex; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 1rem; margin-bottom: 0.5rem; border-radius: 6px; }

        @media (max-width: 768px) {
            .docs-container { grid-template-columns: 1fr; }
            .docs-sidebar { position: static; border-right: none; border-bottom: 1px solid var(--card-border); padding-bottom: 1rem; margin-bottom: 2rem; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">🌐 Codiv</a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="documentation.html" class="active">Docs</a></li>
            </ul>
            <div>
                <button id="adminBtn" class="btn-admin" onclick="document.getElementById('adminModal').classList.add('active'); renderAdminList();">⚙️ Manage Docs</button>
            </div>
        </div>
    </nav>

    <div class="docs-container">
        <aside class="docs-sidebar">
            <h3>Contents</h3>
            <div class="docs-nav" id="docsNav">
                <p style="color:var(--text-secondary); font-size:0.9rem;">Loading...</p>
            </div>
        </aside>
        <main class="docs-content" id="docsContent">
            <h2 style="color:var(--text-secondary);">Loading documentation...</h2>
        </main>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                <h2 style="color:var(--accent-cyan);">Manage Documentation</h2>
                <button onclick="document.getElementById('adminModal').classList.remove('active')" style="background:none;border:none;color:white;font-size:1.5rem;cursor:pointer;">✕</button>
            </div>
            
            <form id="adminForm" class="admin-form" onsubmit="saveDoc(event)" style="background:rgba(0,0,0,0.2); padding:1.5rem; border-radius:8px; margin-bottom:2rem;">
                <input type="hidden" id="docId">
                <div style="display:flex; gap:1rem;">
                    <div style="flex:3;">
                        <label style="color:var(--text-secondary);">Section Title</label>
                        <input type="text" id="docTitle" required placeholder="e.g. Getting Started">
                    </div>
                    <div style="flex:1;">
                        <label style="color:var(--text-secondary);">Order (Number)</label>
                        <input type="number" id="docOrder" required placeholder="1">
                    </div>
                </div>
                <label style="color:var(--text-secondary);">Content (HTML supported)</label>
                <textarea id="docBody" rows="6" required placeholder="<p>Write your content here...</p>"></textarea>
                
                <button type="submit" class="btn-primary" id="saveBtn">Save Section</button>
                <button type="button" class="btn-admin" style="display:inline-block;" onclick="document.getElementById('adminForm').reset(); document.getElementById('docId').value='';">Clear</button>
            </form>

            <h3 style="margin-bottom: 1rem; color: white;">Existing Sections</h3>
            <div id="adminDocList"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBhFr5Iyf7ta7kYAsFyvh6GKhv3fVWkp9E",
            authDomain: "chat-bot-f4f63.firebaseapp.com",
            databaseURL: "https://chat-bot-f4f63-default-rtdb.firebaseio.com",
            projectId: "chat-bot-f4f63"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let allDocs = [];

        // Auth Check
        auth.onAuthStateChanged((user) => {
            if (user) {
                db.ref('admins/' + user.uid).once('value').then((snap) => {
                    if (snap.exists()) document.getElementById('adminBtn').style.display = 'inline-block';
                });
            }
        });

        // Load Docs
        db.ref('documentation/items').on('value', (snapshot) => {
            allDocs = [];
            if (snapshot.exists()) {
                const data = snapshot.val();
                for (let key in data) { allDocs.push({ id: key, ...data[key] }); }
                allDocs.sort((a, b) => (a.order || 0) - (b.order || 0)); // Sort by order
            }
            renderDocs();
            if (document.getElementById('adminModal').classList.contains('active')) renderAdminList();
        });

        function renderDocs() {
            const nav = document.getElementById('docsNav');
            const content = document.getElementById('docsContent');
            nav.innerHTML = ''; content.innerHTML = '';

            if(allDocs.length === 0) {
                content.innerHTML = '<p style="color:var(--text-secondary);">Documentation is currently empty.</p>';
                return;
            }

            allDocs.forEach(doc => {
                const safeId = doc.title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
                nav.innerHTML += `<a href="#${safeId}">${doc.title}</a>`;
                content.innerHTML += `
                    <section class="doc-section" id="${safeId}">
                        <h2>${doc.title}</h2>
                        <div>${doc.content}</div>
                    </section>
                `;
            });
        }

        // Admin Functions
        function renderAdminList() {
            const list = document.getElementById('adminDocList');
            list.innerHTML = '';
            allDocs.forEach(doc => {
                list.innerHTML += `
                    <div class="admin-list-item">
                        <span style="color:var(--accent-cyan); font-weight:600;">[${doc.order}] ${doc.title}</span>
                        <div>
                            <button onclick="editDoc('${doc.id}')" style="background:none; border:none; color:var(--text-primary); cursor:pointer; margin-right:10px;">Edit</button>
                            <button onclick="deleteDoc('${doc.id}')" style="background:none; border:none; color:#fca5a5; cursor:pointer;">Delete</button>
                        </div>
                    </div>
                `;
            });
        }

        async function saveDoc(e) {
            e.preventDefault();
            const id = document.getElementById('docId').value;
            const data = {
                title: document.getElementById('docTitle').value.trim(),
                order: parseInt(document.getElementById('docOrder').value) || 0,
                content: document.getElementById('docBody').value.trim()
            };

            const btn = document.getElementById('saveBtn'); btn.textContent = 'Saving...'; btn.disabled = true;
            try {
                if (id) await db.ref('documentation/items/' + id).update(data);
                else await db.ref('documentation/items').push(data);
                document.getElementById('adminForm').reset();
                document.getElementById('docId').value = '';
            } catch (err) { alert(err.message); }
            finally { btn.textContent = 'Save Section'; btn.disabled = false; }
        }

        function editDoc(id) {
            const doc = allDocs.find(d => d.id === id);
            if (!doc) return;
            document.getElementById('docId').value = doc.id;
            document.getElementById('docTitle').value = doc.title;
            document.getElementById('docOrder').value = doc.order;
            document.getElementById('docBody').value = doc.content;
        }

        async function deleteDoc(id) {
            if(confirm("Delete this documentation section?")) {
                await db.ref('documentation/items/' + id).remove();
            }
        }
    </script>
</body>
</html>
