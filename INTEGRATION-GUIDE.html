<!-- ADD THIS JAVASCRIPT TO YOUR SCRIPT SECTION (Inside the main module script) -->
<script>
    // ===== MONITOR ORDER STATUS FOR COMPLETION =====
    let completionCheckInterval = null;

    function startMonitoringCompletion() {
        if (!currentUser) return;

        const orderId = document.getElementById('trackingId').value.trim();
        if (!orderId) return;

        // Check every 5 seconds if status changed to Completed
        completionCheckInterval = setInterval(() => {
            const userOrderRef = ref(database, `users/${currentUser.uid}/orders/${orderId}`);
            onValue(userOrderRef, (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    
                    // If order status is Completed, show the completion section
                    if (data.status === 'Completed') {
                        showCompletionSection(data, orderId);
                        clearInterval(completionCheckInterval);
                    }
                }
            });
        }, 5000);
    }

    function showCompletionSection(orderData, orderId) {
        document.getElementById('quickOrderSection').classList.remove('hidden');
        
        const infoHTML = `
            <div class="info-item">
                <div class="info-label">Order ID</div>
                <div class="info-value">${orderId.substring(0, 10)}...</div>
            </div>
            <div class="info-item">
                <div class="info-label">Category</div>
                <div class="info-value">${orderData.category}</div>
            </div>
            <div class="info-item">
                <div class="info-label">Budget</div>
                <div class="info-value">$${orderData.budget.toLocaleString()}</div>
            </div>
            <div class="info-item">
                <div class="info-label">Status</div>
                <div class="info-value" style="color: var(--success);">✓ Completed</div>
            </div>
        `;
        
        document.getElementById('completedOrderInfo').innerHTML = infoHTML;
        
        // Scroll to section
        document.getElementById('quickOrderSection').scrollIntoView({ behavior: 'smooth' });
    }

    window.startNewOrder = function() {
        // Clear tracking
        document.getElementById('trackingId').value = '';
        document.getElementById('statusDisplay').classList.add('hidden');
        document.getElementById('quickOrderSection').classList.add('hidden');
        
        // Scroll to order form
        document.getElementById('order').scrollIntoView({ behavior: 'smooth' });
        
        // Clear form for new order
        document.getElementById('orderForm').reset();
        document.getElementById('budgetValue').textContent = '$5,000';
    };

    window.viewDetails = function() {
        document.getElementById('tracker').scrollIntoView({ behavior: 'smooth' });
    };

    // Modify the trackOrder function to include monitoring
    const originalTrackOrder = window.trackOrder;
    window.trackOrder = function() {
        originalTrackOrder.call(this);
        startMonitoringCompletion();
    };
</script>
